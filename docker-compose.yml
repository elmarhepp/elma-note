services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: elma_note
      DB_USERNAME: elma
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/up"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - elma-note

  vite:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - elma-note

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: elma_note
      MYSQL_USER: elma
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "elma", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - elma-note

volumes:
  mysql_data:
  vendor:

networks:
  elma-note:
